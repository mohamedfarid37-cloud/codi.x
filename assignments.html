<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Assignments | CODI.X TEAM</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================================
   GENERAL STYLE
================================ */

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:"Poppins",sans-serif;
background:#12000a;
color:white;
overflow-x:hidden;
}

.container{
width:90%;
max-width:1200px;
margin:auto;
}

/* ================================
   NAVBAR
================================ */

.site-header{
position:sticky;
top:0;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(6px);
padding:12px 0;
z-index:999;
}

.nav-inner{
display:flex;
justify-content:space-between;
align-items:center;
}

.brand{
display:flex;
align-items:center;
gap:10px;
}

.brand img{
width:42px;
border-radius:6px;
}

.brand h2{
font-size:20px;
}

.main-nav ul{
display:flex;
list-style:none;
gap:25px;
}

.main-nav a{
text-decoration:none;
color:white;
font-weight:500;
transition:.3s;
}

.main-nav a:hover{
color:#ff4d8a;
}

/* ================================
   PAGE TITLE
================================ */

.page-title{
text-align:center;
font-size:34px;
margin-top:50px;
font-weight:700;
}

.page-sub{
text-align:center;
color:#caa3b2;
margin-top:10px;
}

/* ================================
   ASSIGNMENTS GRID
================================ */

.tasks-container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
margin-top:40px;
margin-bottom:60px;
}

/* ================================
   TASK CARD
================================ */

.task-card{
background:#3a001f;
border-radius:14px;
padding:20px;
text-align:center;
transition:.35s;
}

.task-card:hover{
transform:translateY(-8px) scale(1.02);
box-shadow:0 12px 25px rgba(0,0,0,0.6);
}

/* ================================
   TASK IMAGE
================================ */

.task-card img{
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
margin-bottom:15px;
}

/* ================================
   TASK TITLE
================================ */

.task-title{
font-size:20px;
font-weight:600;
margin-bottom:10px;
}

/* ================================
   TASK INFO
================================ */

.task-info{
font-size:14px;
color:#caa3b2;
margin-bottom:6px;
}

/* ================================
   DOWNLOAD BUTTON
================================ */

.download-btn{
display:inline-block;
margin-top:12px;
padding:9px 18px;
background:#ff4d8a;
color:white;
text-decoration:none;
border-radius:8px;
font-size:14px;
transition:.3s;
}

.download-btn:hover{
background:#ff2e74;
}

/* ================================
   FOOTER
================================ */

footer{
border-top:1px solid rgba(255,255,255,0.1);
padding:25px 0;
text-align:center;
color:#caa3b2;
}

/* ================================
   MOBILE
================================ */

@media(max-width:768px){

.main-nav ul{
gap:15px;
font-size:14px;
}

.page-title{
font-size:26px;
}

.task-card img{
width:100px;
height:100px;
}

}

/* ================================
   GLOBAL RESPONSIVE FIX
================================ */

/* الصور متكبرش عن الكرت */
/* img{
max-width:100%;
height:auto;
display:block;
} */
/* الصور العامة */
img{
max-width:100%;
height:auto;
}

/* صور الكروت في المنتصف */
.course-card img{
display:block;
margin:0 auto 15px auto;
}
/* يخلي العناصر تلف تحت بعض لو الشاشة صغيرة */
.nav-inner{
flex-wrap:wrap;
}

/* المينيو تبقى في سطر تحت اللوجو في الموبايل */
@media (max-width:768px){

.main-nav{
width:100%;
margin-top:10px;
}

.main-nav ul{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
padding:0;
}

.main-nav a{
font-size:14px;
}

/* يقلل المسافات */
.wrap,
.container{
width:95%;
}

/* يخلي الكروت تملى الشاشة */
.courses-container{
grid-template-columns:1fr;
}

/* أي جريد تانية */
.cards,
.grid,
.items{
grid-template-columns:1fr !important;
}

}

/* موبايلات أصغر */
@media (max-width:480px){

.page-title{
font-size:22px;
}

.brand h2{
font-size:18px;
}

}

</style>

</head>

<body>

<!-- ================================

<header class="site-header">

<div class="container nav-inner">

<div class="brand">

</div>

<ul>

</ul>
</nav>

</div>

<!-- ================================

================================ -->

</p>


<!-- ================================

================================ -->

</div>


<footer>

</footer>

</body>
</html>
